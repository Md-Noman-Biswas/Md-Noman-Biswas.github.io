<nav class="navbar navbar-expand-md sticky-top" id="main-navbar">
  <div class="container" style="max-width: 900px;">

    <a class="navbar-brand" href="{{ '/' | relative_url }}">
      {{ site.author.name }}
    </a>

    <!-- Mobile: theme toggle + hamburger always visible -->
    <div class="d-flex d-md-none align-items-center gap-1">
      {% include theme-toggle.html %}
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarMain"
              aria-controls="navbarMain"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav ms-auto align-items-md-center me-2">
        {% for item in site.data.navigation %}
        <li class="nav-item">
          <a class="nav-link{% if page.url == item.url %} active{% endif %}"
             href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
      <!-- Desktop: theme toggle inside collapse -->
      <div class="d-none d-md-flex align-items-center">
        {% include theme-toggle.html %}
      </div>
    </div>

  </div>
</nav>
