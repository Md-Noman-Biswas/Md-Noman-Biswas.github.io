<nav class="navbar navbar-expand-md sticky-top" id="main-navbar">
  <div class="container" style="max-width: {{ site.max_width | default: '900px' }};">

    <a class="navbar-brand" href="{{ '/' | relative_url }}">
      {{ site.author.name }}
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMain"
            aria-controls="navbarMain"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav ms-auto align-items-md-center me-2">
        {% for item in site.data.navigation %}
        <li class="nav-item">
          <a class="nav-link{% if page.url == item.url or page.url == item.url | append: 'index.html' %} active{% endif %}"
             href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
      {% include theme-toggle.html %}
    </div>

  </div>
</nav>
