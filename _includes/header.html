<nav class="navbar navbar-expand-md sticky-top" id="main-navbar">
  <div class="container d-flex align-items-center" style="max-width: 900px;">

    <!-- Brand -->
    <a class="navbar-brand me-auto" href="{{ '/' | relative_url }}">
      {{ site.author.name }}
    </a>

    <!-- Theme toggle + mobile hamburger always visible -->
    <div class="d-flex align-items-center gap-1 ms-2">
      {% include theme-toggle.html %}

      <button class="navbar-toggler border-0 ms-1" type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarMain"
              aria-controls="navbarMain"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <!-- Collapsible nav links -->
    <div class="collapse navbar-collapse flex-grow-0" id="navbarMain">
      <ul class="navbar-nav ms-3 align-items-md-center">
        {% for item in site.data.navigation %}
        <li class="nav-item">
          <a class="nav-link{% if page.url == item.url %} active{% endif %}"
             href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>

  </div>
</nav>
