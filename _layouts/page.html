---
layout: default
---

<div class="container page-container" style="max-width: 900px;">
  {% if page.title %}
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-subtitle">{{ page.description }}</p>
    {% endif %}
    <hr>
  </header>
  {% endif %}

  <div class="page-content">
    {{ content }}
  </div>
</div>
